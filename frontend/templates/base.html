<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LLM-AlertBridge{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        soc: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            text: '#e2e8f0',
                            muted: '#94a3b8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .htmx-indicator { opacity: 0; transition: opacity 300ms ease-in; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="dark h-full bg-soc-bg text-soc-text">
    <nav class="bg-soc-card border-b border-soc-border px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/alerts" class="text-lg font-bold text-white tracking-wide">
                LLM-AlertBridge
            </a>
            <div class="flex items-center gap-4 text-sm text-soc-muted">
                <a href="/alerts" class="hover:text-white transition-colors">Alerts</a>
                <a href="/health" class="hover:text-white transition-colors">Health</a>
                <a href="/docs" class="hover:text-white transition-colors">API Docs</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
