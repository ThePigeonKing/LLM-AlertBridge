# Prefer from repo root: docker compose -f docker-compose.wazuh-certs.yml run --rm generator
# Or from this directory: docker compose -f generate-indexer-certs.yml run --rm generator
version: '3'

services:
  generator:
    image: wazuh/wazuh-certs-generator:0.0.2
    hostname: wazuh-certs-generator
    volumes:
      - ./config/wazuh_indexer_ssl_certs/:/certificates/
      - ./config/certs.yml:/config/certs.yml
